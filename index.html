  /* ==========================================================================
     OVERLAY HELPERS
     ========================================================================== */

  function showOverlay(html, dim) {
    const overlay = $("overlay");
    const box = $("box");

    overlay.className = dim ? "dim" : "";
    overlay.style.display = "flex";
    box.innerHTML = html;
  }

  function hideOverlay() {
    const overlay = $("overlay");

    overlay.className = "";
    overlay.style.display = "none";
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  /* ==========================================================================
     INPUT HANDLING
     ========================================================================== */

  function performAction(action) {
    if (action === "left") {
      moveHorizontal(-1);
      return;
    }

    if (action === "right") {
      moveHorizontal(1);
      return;
    }

    if (action === "softDrop") {
      softDrop(true);
      return;
    }

    if (action === "rotateCw") {
      rotatePiece(1);
      return;
    }

    if (action === "rotateCcw") {
      rotatePiece(-1);
      return;
    }

    if (action === "hardDrop") {
      hardDrop();
      return;
    }

    if (action === "hold") {
      holdPiece();
      return;
    }
  }

  window.act = function act(action) {
    performAction(action);
  };

  function keyMatches(eventKey, bindingName) {
    const binding = keys[bindingName];

    if (eventKey === binding) {
      return true;
    }

    return eventKey.toLowerCase() === String(binding).toLowerCase();
  }

  function shouldPreventDefault(eventKey) {
    const defaultPreventKeys = [
      "ArrowLeft",
      "ArrowRight",
      "ArrowDown",
      "ArrowUp",
      " ",
      "Enter"
    ];

    if (defaultPreventKeys.includes(eventKey)) {
      return true;
    }

    return Object.values(keys).includes(eventKey);
  }

  document.addEventListener("keydown", event => {
    if (shouldPreventDefault(event.key)) {
      event.preventDefault();
    }

    if (!started) {
      const tag = document.activeElement.tagName;

      if (
        tag !== "SELECT" &&
        tag !== "INPUT" &&
        tag !== "BUTTON" &&
        tag !== "TEXTAREA"
      ) {
        window.openModeSetup();
      }

      return;
    }

    if (gameOver) {
      if (keyMatches(event.key, "restart")) {
        window.startGame();
      }

      return;
    }

    if (
      keyMatches(event.key, "pause") ||
      event.key === "Escape"
    ) {
      pauseGame();
      return;
    }

    if (keyMatches(event.key, "restart")) {
      window.requestRestart();
      return;
    }

    if (keyMatches(event.key, "music")) {
      musicEnabled = !musicEnabled;
      savePreferences();

      if (musicEnabled) {
        startMusic();
      } else {
        stopMusic(true);
      }

      return;
    }

    if (keyMatches(event.key, "sfx")) {
      sfxEnabled = !sfxEnabled;
      savePreferences();
      return;
    }

    if (keyMatches(event.key, "ghost")) {
      ghostEnabled = !ghostEnabled;
      savePreferences();
      return;
    }

    if (keyMatches(event.key, "zenClear")) {
      clearZenBoard();
      return;
    }

    if (paused) {
      return;
    }

    if (keyMatches(event.key, "left")) {
      if (!moveLeftHeld) {
        moveLeftHeld = true;
        leftDasTimer = 0;
        leftArrTimer = 0;
        moveHorizontal(-1);
      }

      return;
    }

    if (keyMatches(event.key, "right")) {
      if (!moveRightHeld) {
        moveRightHeld = true;
        rightDasTimer = 0;
        rightArrTimer = 0;
        moveHorizontal(1);
      }

      return;
    }

    if (keyMatches(event.key, "softDrop")) {
      if (!softDropHeld) {
        softDropHeld = true;
        softDropHoldTimer = 0;
        softDropRepeatTimer = 0;
        softDrop(true);
      }

      return;
    }

    if (
      keyMatches(event.key, "rotateCw") ||
      keyMatches(event.key, "rotateCwAlt")
    ) {
      rotatePiece(1);
      return;
    }

    if (keyMatches(event.key, "rotateCcw")) {
      rotatePiece(-1);
      return;
    }

    if (
      keyMatches(event.key, "hardDrop") ||
      keyMatches(event.key, "hardDropAlt")
    ) {
      hardDrop();
      return;
    }

    if (keyMatches(event.key, "hold")) {
      holdPiece();
    }
  });

  document.addEventListener("keyup", event => {
    if (keyMatches(event.key, "left")) {
      moveLeftHeld = false;
    }

    if (keyMatches(event.key, "right")) {
      moveRightHeld = false;
    }

    if (keyMatches(event.key, "softDrop")) {
      softDropHeld = false;
    }
  });

  /* ==========================================================================
     TOUCH / MOBILE INPUT
     ========================================================================== */

  let pointerTracking = false;
  let pointerStartX = 0;
  let pointerStartY = 0;
  let pointerStartTime = 0;
  let lastBoardTouchTime = 0;
  let lastBoardTapTime = 0;

  function isMobileLikeInput(event) {
    if (!event || !event.pointerType) {
      return true;
    }

    return event.pointerType !== "mouse";
  }

  function handleBoardGesture(endX, endY) {
    const dx = endX - pointerStartX;
    const dy = endY - pointerStartY;
    const elapsed = performance.now() - pointerStartTime;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    if (absX < 22 && absY < 22) {
      const now = performance.now();

      if (now - lastBoardTapTime < 280) {
        lastBoardTapTime = 0;
        holdPiece();
      } else {
        lastBoardTapTime = now;
        rotatePiece(1);
      }

      return;
    }

    if (absX > absY) {
      moveHorizontal(dx > 0 ? 1 : -1);
      return;
    }

    if (dy > 0) {
      if (dy > 96 && elapsed < 240) {
        hardDrop();
      } else {
        softDrop(true);
      }
    }
  }

  boardCanvas.addEventListener(
    "pointerdown",
    event => {
      if (!isMobileLikeInput(event)) {
        return;
      }

      event.preventDefault();

      if (performance.now() - lastBoardTouchTime < 40) {
        return;
      }

      pointerTracking = true;
      pointerStartX = event.clientX;
      pointerStartY = event.clientY;
      pointerStartTime = performance.now();

      try {
        boardCanvas.setPointerCapture(event.pointerId);
      } catch (error) {
        /* ignored */
      }
    },
    { passive: false }
  );

  boardCanvas.addEventListener(
    "pointerup",
    event => {
      if (!isMobileLikeInput(event)) {
        return;
      }

      event.preventDefault();

      if (!pointerTracking) {
        return;
      }

      pointerTracking = false;
      lastBoardTouchTime = performance.now();

      handleBoardGesture(event.clientX, event.clientY);
    },
    { passive: false }
  );

  boardCanvas.addEventListener(
    "pointercancel",
    event => {
      if (!isMobileLikeInput(event)) {
        return;
      }

      event.preventDefault();
      pointerTracking = false;
    },
    { passive: false }
  );

  boardCanvas.addEventListener(
    "touchstart",
    event => {
      event.preventDefault();

      const touch = event.changedTouches[0];

      pointerTracking = true;
      pointerStartX = touch.clientX;
      pointerStartY = touch.clientY;
      pointerStartTime = performance.now();
    },
    { passive: false }
  );

  boardCanvas.addEventListener(
    "touchend",
    event => {
      event.preventDefault();

      if (!pointerTracking) {
        return;
      }

      if (performance.now() - lastBoardTouchTime < 40) {
        pointerTracking = false;
        return;
      }

      pointerTracking = false;
      lastBoardTouchTime = performance.now();

      const touch = event.changedTouches[0];
      handleBoardGesture(touch.clientX, touch.clientY);
    },
    { passive: false }
  );

  boardCanvas.addEventListener(
    "touchcancel",
    event => {
      event.preventDefault();
      pointerTracking = false;
    },
    { passive: false }
  );

  const mobileMenuButton = $("mobileMenu");

  if (mobileMenuButton) {
    mobileMenuButton.addEventListener(
      "click",
      event => {
        event.preventDefault();
        window.mobileQuickMenu();
      },
      { passive: false }
    );
  }

  let touchRepeatTimer = null;

  function stopTouchRepeat() {
    if (touchRepeatTimer) {
      clearInterval(touchRepeatTimer);
      touchRepeatTimer = null;
    }
  }

  function startTouchRepeat(action) {
    if (!action) {
      return;
    }

    stopTouchRepeat();

    performAction(action);
    haptic(action === "hardDrop" ? "drop" : "tap");

    const repeatableActions = ["left", "right", "softDrop"];

    if (!repeatableActions.includes(action)) {
      return;
    }

    const interval = action === "softDrop"
      ? Math.max(1, Number(config.softDropRepeat) || 1)
      : 80;

    touchRepeatTimer = setInterval(() => {
      performAction(action);
    }, interval);
  }

  const mobileActionMap = {
    l: "left",
    r: "right",
    d: "softDrop",
    cw: "rotateCw",
    ccw: "rotateCcw",
    hd: "hardDrop",
    h: "hold"
  };

  document.querySelectorAll("#mobile button").forEach(button => {
    const rawAction = button.dataset.act;
    const action = mobileActionMap[rawAction];

    if (!action) {
      return;
    }

    const startEventName = window.PointerEvent ? "pointerdown" : "touchstart";
    const endEventName = window.PointerEvent ? "pointerup" : "touchend";
    const cancelEventName = window.PointerEvent ? "pointercancel" : "touchcancel";

    button.addEventListener(
      startEventName,
      event => {
        event.preventDefault();
        startTouchRepeat(action);
      },
      { passive: false }
    );

    button.addEventListener(
      endEventName,
      event => {
        event.preventDefault();
        stopTouchRepeat();
      },
      { passive: false }
    );

    button.addEventListener(
      cancelEventName,
      event => {
        event.preventDefault();
        stopTouchRepeat();
      },
      { passive: false }
    );
  });

  document.addEventListener(
    "touchmove",
    event => {
      const target = event.target;

      if (
        typeof Element !== "undefined" &&
        target instanceof Element &&
        (
          target.closest("#mobile") ||
          target.closest("#board") ||
          target.closest("#wrap")
        )
      ) {
        event.preventDefault();
      }
    },
    { passive: false }
  );

  window.addEventListener("blur", stopTouchRepeat);
  window.addEventListener("pagehide", stopTouchRepeat);
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      stopTouchRepeat();
    }
  });

  /* ==========================================================================
     AUDIO
     ========================================================================== */

  function initAudio() {
    if (!audioContext) {
      const AudioContextClass =
        window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) {
        return;
      }

      audioContext = new AudioContextClass();
    }

    if (audioContext.state === "suspended") {
      audioContext.resume();
    }
  }

  function noteToFrequency(note) {
    const semitoneMap = {
      C: -9,
      "C#": -8,
      D: -7,
      "D#": -6,
      E: -5,
      F: -4,
      "F#": -3,
      G: -2,
      "G#": -1,
      A: 0,
      "A#": 1,
      B: 2
    };

    const match = note.match(/^([A-G]#?)(\d)$/);

    if (!match) {
      return 0;
    }

    const noteName = match[1];
    const octave = Number(match[2]);

    return 440 * Math.pow(
      2,
      (semitoneMap[noteName] + (octave - 4) * 12) / 12
    );
  }

  function stopAllTones() {
    for (const oscillator of activeOscillators) {
      try {
        oscillator.stop();
      } catch (error) {
        /* oscillator may already be stopped */
      }
    }

    activeOscillators = [];
  }

  function playTone(
    frequency,
    startTimeValue,
    duration,
    type = "square",
    volume = 0.04
  ) {
    if (!audioContext) {
      return;
    }

    if (audioContext.state !== "running") {
      return;
    }

    if (!frequency) {
      return;
    }

    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();

    oscillator.type = type;
    oscillator.frequency.value = frequency;

    gain.gain.setValueAtTime(0, startTimeValue);
    gain.gain.linearRampToValueAtTime(volume, startTimeValue + 0.01);
    gain.gain.setValueAtTime(volume, startTimeValue + duration * 0.85);
    gain.gain.linearRampToValueAtTime(0, startTimeValue + duration);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);

    oscillator.onended = () => {
      activeOscillators = activeOscillators.filter(item => item !== oscillator);
    };

    activeOscillators.push(oscillator);

    oscillator.start(startTimeValue);
    oscillator.stop(startTimeValue + duration + 0.03);
  }

  function haptic(name) {
    if (!navigator.vibrate) {
      return;
    }

    const patterns = {
      tap: 8,
      move: 6,
      rotate: 8,
      drop: 22,
      hold: 12,
      clear: [18, 35, 18],
      garbage: [24, 40, 24],
      game: [40, 50, 80]
    };

    try {
      navigator.vibrate(patterns[name] || 8);
    } catch (error) {
      /* ignored */
    }
  }

  function playSfx(name) {
    haptic(name);

    if (!sfxEnabled) {
      return;
    }

    initAudio();

    if (!audioContext) {
      return;
    }

    const now = audioContext.currentTime;
    const sfxVol = config.sfxVolume;

    if (name === "move") {
      playTone(180, now, 0.03, "square", 0.04 * sfxVol);
      return;
    }

    if (name === "rotate") {
      playTone(260, now, 0.04, "square", 0.04 * sfxVol);
      return;
    }

    if (name === "drop") {
      playTone(90, now, 0.06, "square", 0.05 * sfxVol);
      return;
    }

    if (name === "hold") {
      playTone(330, now, 0.05, "triangle", 0.04 * sfxVol);
      return;
    }

    if (name === "clear") {
      playTone(523, now, 0.07, "square", 0.04 * sfxVol);
      playTone(659, now + 0.07, 0.07, "square", 0.04 * sfxVol);
      playTone(784, now + 0.14, 0.12, "square", 0.04 * sfxVol);
      return;
    }

    if (name === "garbage") {
      playTone(110, now, 0.05, "sawtooth", 0.03 * sfxVol);
      playTone(82, now + 0.06, 0.07, "sawtooth", 0.03 * sfxVol);
      return;
    }

    if (name === "game") {
      playTone(330, now, 0.16, "square", 0.04 * sfxVol);
      playTone(247, now + 0.16, 0.16, "square", 0.04 * sfxVol);
      playTone(196, now + 0.32, 0.25, "square", 0.04 * sfxVol);
    }
  }

  const MUSIC_MELODY = [
    ["E5", 1], ["B4", 0.5], ["C5", 0.5], ["D5", 1],
    ["C5", 0.5], ["B4", 0.5], ["A4", 1], ["A4", 0.5],
    ["C5", 0.5], ["E5", 1], ["D5", 0.5], ["C5", 0.5],
    ["B4", 1], ["C5", 0.5], ["D5", 1], ["E5", 1],
    ["C5", 1], ["A4", 1], ["A4", 1],

    ["D5", 1], ["F5", 0.5], ["A5", 1], ["G5", 0.5],
    ["F5", 0.5], ["E5", 1], ["C5", 0.5], ["E5", 1],
    ["D5", 0.5], ["C5", 0.5], ["B4", 1], ["B4", 0.5],
    ["C5", 0.5], ["D5", 1], ["E5", 1], ["C5", 1],
    ["A4", 1], ["A4", 1]
  ];

  function scheduleMusic(generation) {
    if (generation !== musicGeneration) {
      return;
    }

    if (!audioContext || !musicEnabled || paused || gameOver || !started) {
      return;
    }

    const beatsPerMinute = Math.min(176, 132 + (level - 1) * 2);
    const beatLength = 60 / beatsPerMinute;

    let time = audioContext.currentTime + 0.05;

    for (const [note, length] of MUSIC_MELODY) {
      if (generation !== musicGeneration) {
        return;
      }

      playTone(
        noteToFrequency(note),
        time,
        beatLength * length * 0.92,
        "square",
        0.035 * config.musicVolume
      );

      const bassNote = note.replace(/\d/, digit => {
        return Math.max(2, Number(digit) - 2);
      });

      playTone(
        noteToFrequency(bassNote),
        time,
        beatLength * length * 0.9,
        "triangle",
        0.018 * config.musicVolume
      );

      time += beatLength * length;
    }

    const delay = Math.max(
      100,
      (time - audioContext.currentTime - 0.1) * 1000
    );

    musicTimer = setTimeout(() => {
      scheduleMusic(generation);
    }, delay);
  }

  function startMusic() {
    initAudio();
    stopMusic(true);

    musicGeneration++;
    scheduleMusic(musicGeneration);
  }

  function stopMusic(stopScheduledTones = false) {
    musicGeneration++;

    if (musicTimer) {
      clearTimeout(musicTimer);
    }

    musicTimer = null;

    if (stopScheduledTones) {
      stopAllTones();
    }
  }

  /* ==========================================================================
     INITIALIZATION
     ========================================================================== */

  board = createEmptyBoard();
  queue = [];

  refillSevenBag();
  refillSevenBag();

  applyAccessibilitySettings();
  window.menu();
  updateUi();

  requestAnimationFrame(gameLoop);

})();
</script>

<script>
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
